name: Performance And SEO CI

on:
  pull_request:
    paths:
      - "apps/web/**"
      - ".github/workflows/performance-seo-ci.yml"
      - "package.json"
      - "bun.lock"
  push:
    branches:
      - main
    paths:
      - "apps/web/**"
      - ".github/workflows/performance-seo-ci.yml"
      - "package.json"
      - "bun.lock"

jobs:
  budgets-and-lighthouse:
    runs-on: ubuntu-latest
    env:
      NEXT_PUBLIC_SITE_URL: http://127.0.0.1:3000
      PERF_BUDGET_HOME_HTML_GZIP_BYTES: 11500
      PERF_BUDGET_HOME_SCRIPT_COUNT: 16
      PERF_BUDGET_LOCALE_INITIAL_JS_GZIP_BYTES: 275000
      PERF_BUDGET_LARGEST_CHUNK_GZIP_BYTES: 80000
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.6"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Lint web app
        run: bun run --cwd apps/web lint

      - name: Typecheck web app
        run: bun run --cwd apps/web check-types

      - name: Build web app
        run: bun run --cwd apps/web build

      - name: Enforce performance budgets
        run: bun run --cwd apps/web perf:budget

      - name: Lighthouse CI
        run: bunx --package @lhci/cli lhci autorun --config=apps/web/lighthouserc.json
