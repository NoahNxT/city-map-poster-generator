name: Production Deploy

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

concurrency:
  group: production-deploy
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io
  API_IMAGE_NAME: city-map-api
  WEB_IMAGE_NAME: city-map-web

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      api_image: ${{ steps.image_vars.outputs.api_image }}
      web_image: ${{ steps.image_vars.outputs.web_image }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Compute image names
        id: image_vars
        run: |
          set -eu
          owner_lc="$(echo "${GITHUB_REPOSITORY_OWNER}" | tr '[:upper:]' '[:lower:]')"
          echo "api_image=${REGISTRY}/${owner_lc}/${API_IMAGE_NAME}" >> "${GITHUB_OUTPUT}"
          echo "web_image=${REGISTRY}/${owner_lc}/${WEB_IMAGE_NAME}" >> "${GITHUB_OUTPUT}"

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push API image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./docker/api.Dockerfile
          push: true
          tags: |
            ${{ steps.image_vars.outputs.api_image }}:production
            ${{ steps.image_vars.outputs.api_image }}:${{ github.sha }}
          cache-from: type=gha,scope=city-map-api
          cache-to: type=gha,mode=max,scope=city-map-api

      - name: Build and push web image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./docker/web-prod.Dockerfile
          push: true
          build-args: |
            NEXT_PUBLIC_API_BASE_URL=${{ vars.PRODUCTION_NEXT_PUBLIC_API_BASE_URL || 'http://localhost:8000' }}
            NEXT_PUBLIC_TURNSTILE_SITE_KEY=${{ vars.PRODUCTION_NEXT_PUBLIC_TURNSTILE_SITE_KEY || '' }}
            NEXT_PUBLIC_SITE_URL=${{ vars.PRODUCTION_NEXT_PUBLIC_SITE_URL || 'http://localhost:3000' }}
          tags: |
            ${{ steps.image_vars.outputs.web_image }}:production
            ${{ steps.image_vars.outputs.web_image }}:${{ github.sha }}
          cache-from: type=gha,scope=city-map-web
          cache-to: type=gha,mode=max,scope=city-map-web

  deploy:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Upload production compose files
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.PRODUCTION_HOST }}
          username: ${{ secrets.PRODUCTION_USER }}
          key: ${{ secrets.PRODUCTION_SSH_KEY }}
          port: ${{ secrets.PRODUCTION_PORT || 22 }}
          source: ".docker/production/compose.yaml,.docker/production/.env.example"
          target: ${{ secrets.PRODUCTION_PATH }}
          strip_components: 0

      - name: Deploy production on Hetzner VPS
        uses: appleboy/ssh-action@v1.2.0
        env:
          DEPLOY_PATH: ${{ secrets.PRODUCTION_PATH }}
          API_IMAGE: ${{ needs.build.outputs.api_image }}
          WEB_IMAGE: ${{ needs.build.outputs.web_image }}
          GHCR_USERNAME: ${{ secrets.GHCR_USERNAME }}
          GHCR_TOKEN: ${{ secrets.GHCR_TOKEN }}
        with:
          host: ${{ secrets.PRODUCTION_HOST }}
          username: ${{ secrets.PRODUCTION_USER }}
          key: ${{ secrets.PRODUCTION_SSH_KEY }}
          port: ${{ secrets.PRODUCTION_PORT || 22 }}
          envs: DEPLOY_PATH,API_IMAGE,WEB_IMAGE,GHCR_USERNAME,GHCR_TOKEN
          script: |
            set -eu

            mkdir -p "${DEPLOY_PATH}/.docker/production"
            cd "${DEPLOY_PATH}"

            if [ ! -f ".docker/production/.env" ]; then
              cp ".docker/production/.env.example" ".docker/production/.env"
              echo "Created .docker/production/.env from template. Fill required values and re-run the workflow."
              exit 1
            fi

            upsert_env() {
              key="$1"
              value="$2"
              file="$3"
              if grep -q "^${key}=" "$file"; then
                sed -i "s#^${key}=.*#${key}=${value}#g" "$file"
              else
                printf '%s=%s\n' "${key}" "${value}" >> "$file"
              fi
            }

            upsert_env "API_IMAGE" "${API_IMAGE}" ".docker/production/.env"
            upsert_env "WEB_IMAGE" "${WEB_IMAGE}" ".docker/production/.env"
            upsert_env "IMAGE_TAG" "production" ".docker/production/.env"

            echo "${GHCR_TOKEN}" | docker login ghcr.io -u "${GHCR_USERNAME}" --password-stdin

            compose_cmd="docker compose --env-file .docker/production/.env -f .docker/production/compose.yaml"

            ${compose_cmd} pull
            ${compose_cmd} up -d --remove-orphans
