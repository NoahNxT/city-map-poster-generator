services:
  web:
    image: ${WEB_IMAGE}:${IMAGE_TAG}
    restart: unless-stopped
    environment:
      NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL}
      NEXT_PUBLIC_TURNSTILE_SITE_KEY: ${NEXT_PUBLIC_TURNSTILE_SITE_KEY}
      NEXT_PUBLIC_SITE_URL: ${NEXT_PUBLIC_SITE_URL}
      NEXT_PUBLIC_PREVIEW_ENGINE: ${NEXT_PUBLIC_PREVIEW_ENGINE:-snapshot}
    ports:
      - "${WEB_PORT:-3000}:3000"
    depends_on:
      - api

  api:
    image: ${API_IMAGE}:${IMAGE_TAG}
    restart: unless-stopped
    environment: &api_env
      APP_ENV: ${APP_ENV:-production}
      APP_BASE_URL: ${APP_BASE_URL}
      PORT: 8000
      REDIS_URL: redis://redis:6379/0
      RQ_QUEUE_NAME: ${RQ_QUEUE_NAME:-map_jobs}
      S3_ENDPOINT_URL: ${S3_ENDPOINT_URL:-http://minio:9000}
      S3_PUBLIC_ENDPOINT_URL: ${S3_PUBLIC_ENDPOINT_URL}
      S3_REGION_NAME: ${S3_REGION_NAME:-us-east-1}
      S3_ACCESS_KEY_ID: ${S3_ACCESS_KEY_ID}
      S3_SECRET_ACCESS_KEY: ${S3_SECRET_ACCESS_KEY}
      S3_BUCKET_PREVIEWS: ${S3_BUCKET_PREVIEWS:-map-previews}
      S3_BUCKET_ARTIFACTS: ${S3_BUCKET_ARTIFACTS:-map-artifacts}
      S3_SECURE: ${S3_SECURE:-false}
      PREVIEW_TTL_SECONDS: ${PREVIEW_TTL_SECONDS:-43200}
      PREVIEW_RASTER_DPI: ${PREVIEW_RASTER_DPI:-120}
      ARTIFACT_TTL_SECONDS: ${ARTIFACT_TTL_SECONDS:-86400}
      PRESIGNED_URL_TTL_SECONDS: ${PRESIGNED_URL_TTL_SECONDS:-3600}
      CAPTCHA_REQUIRED: ${CAPTCHA_REQUIRED:-true}
      TURNSTILE_SECRET_KEY: ${TURNSTILE_SECRET_KEY}
      TURNSTILE_VERIFY_URL: ${TURNSTILE_VERIFY_URL:-https://challenges.cloudflare.com/turnstile/v0/siteverify}
      RATE_LIMIT_PREVIEW_COUNT: ${RATE_LIMIT_PREVIEW_COUNT:-20}
      RATE_LIMIT_PREVIEW_WINDOW_SECONDS: ${RATE_LIMIT_PREVIEW_WINDOW_SECONDS:-600}
      RATE_LIMIT_LOCATIONS_COUNT: ${RATE_LIMIT_LOCATIONS_COUNT:-60}
      RATE_LIMIT_LOCATIONS_WINDOW_SECONDS: ${RATE_LIMIT_LOCATIONS_WINDOW_SECONDS:-600}
      RATE_LIMIT_FONTS_COUNT: ${RATE_LIMIT_FONTS_COUNT:-120}
      RATE_LIMIT_FONTS_WINDOW_SECONDS: ${RATE_LIMIT_FONTS_WINDOW_SECONDS:-600}
      RATE_LIMIT_JOBS_COUNT: ${RATE_LIMIT_JOBS_COUNT:-3}
      RATE_LIMIT_JOBS_WINDOW_SECONDS: ${RATE_LIMIT_JOBS_WINDOW_SECONDS:-600}
      RATE_LIMIT_MAX_CONCURRENT_JOBS_PER_IP: ${RATE_LIMIT_MAX_CONCURRENT_JOBS_PER_IP:-2}
      REQUEST_TIMEOUT_SECONDS: ${REQUEST_TIMEOUT_SECONDS:-60}
      NOMINATIM_SEARCH_URL: ${NOMINATIM_SEARCH_URL:-https://nominatim.openstreetmap.org/search}
      NOMINATIM_USER_AGENT: ${NOMINATIM_USER_AGENT:-city-map-poster-generator/2.0}
      OVERPASS_URL: ${OVERPASS_URL:-https://overpass-api.de/api/interpreter}
      GOOGLE_FONTS_API_URL: ${GOOGLE_FONTS_API_URL:-https://www.googleapis.com/webfonts/v1/webfonts}
      GOOGLE_FONTS_API_KEY: ${GOOGLE_FONTS_API_KEY}
      GOOGLE_FONTS_METADATA_URL: ${GOOGLE_FONTS_METADATA_URL:-https://fonts.google.com/metadata/fonts}
      GOOGLE_FONTS_CACHE_TTL_SECONDS: ${GOOGLE_FONTS_CACHE_TTL_SECONDS:-86400}
      THEMES_CACHE_TTL_SECONDS: ${THEMES_CACHE_TTL_SECONDS:-3600}
      FONTS_CACHE_TTL_SECONDS: ${FONTS_CACHE_TTL_SECONDS:-900}
      LOCATIONS_CACHE_TTL_SECONDS: ${LOCATIONS_CACHE_TTL_SECONDS:-300}
      GEOCODE_CACHE_TTL_SECONDS: ${GEOCODE_CACHE_TTL_SECONDS:-1800}
      OVERPASS_CACHE_TTL_SECONDS: ${OVERPASS_CACHE_TTL_SECONDS:-3600}
      WORKER_THEME_PARALLELISM: ${WORKER_THEME_PARALLELISM:-2}
      CACHE_DIR: ${CACHE_DIR:-/tmp/map-cache}
      ASSETS_DIR: ${ASSETS_DIR:-/app/assets}
    ports:
      - "${API_PORT:-8000}:8000"
    depends_on:
      - redis
      - minio
    volumes:
      - map_cache:/tmp/map-cache

  worker:
    image: ${API_IMAGE}:${IMAGE_TAG}
    command: ["/app/worker"]
    restart: unless-stopped
    environment: *api_env
    depends_on:
      - redis
      - minio
    volumes:
      - map_cache:/tmp/map-cache

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - redis_data:/data

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    restart: unless-stopped
    environment:
      MINIO_ROOT_USER: ${S3_ACCESS_KEY_ID}
      MINIO_ROOT_PASSWORD: ${S3_SECRET_ACCESS_KEY}
    ports:
      - "${MINIO_API_PORT:-9000}:9000"
      - "${MINIO_CONSOLE_PORT:-9001}:9001"
    volumes:
      - minio_data:/data

volumes:
  map_cache:
  minio_data:
  redis_data:
