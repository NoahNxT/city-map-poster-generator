services:
  web:
    build:
      context: .
      dockerfile: docker/web.Dockerfile
    container_name: city-map-web
    environment:
      NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-http://localhost:8000}
      NEXT_PUBLIC_TURNSTILE_SITE_KEY: ${NEXT_PUBLIC_TURNSTILE_SITE_KEY:-}
    ports:
      - "3000:3000"
    depends_on:
      - api

  api:
    build:
      context: .
      dockerfile: docker/api.Dockerfile
    container_name: city-map-api
    environment:
      APP_ENV: ${APP_ENV:-development}
      APP_BASE_URL: ${APP_BASE_URL:-http://localhost:8000}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      RQ_QUEUE_NAME: ${RQ_QUEUE_NAME:-map_jobs}
      S3_ENDPOINT_URL: ${S3_ENDPOINT_URL:-http://minio:9000}
      S3_PUBLIC_ENDPOINT_URL: ${S3_PUBLIC_ENDPOINT_URL:-http://localhost:9000}
      S3_REGION_NAME: ${S3_REGION_NAME:-us-east-1}
      S3_ACCESS_KEY_ID: ${S3_ACCESS_KEY_ID:-minioadmin}
      S3_SECRET_ACCESS_KEY: ${S3_SECRET_ACCESS_KEY:-minioadmin}
      S3_BUCKET_PREVIEWS: ${S3_BUCKET_PREVIEWS:-map-previews}
      S3_BUCKET_ARTIFACTS: ${S3_BUCKET_ARTIFACTS:-map-artifacts}
      S3_SECURE: ${S3_SECURE:-false}
      PREVIEW_TTL_SECONDS: ${PREVIEW_TTL_SECONDS:-43200}
      PREVIEW_RASTER_DPI: ${PREVIEW_RASTER_DPI:-120}
      PREVIEW_NETWORK_TYPE: ${PREVIEW_NETWORK_TYPE:-drive}
      PREVIEW_INCLUDE_WATER: ${PREVIEW_INCLUDE_WATER:-false}
      PREVIEW_INCLUDE_PARKS: ${PREVIEW_INCLUDE_PARKS:-false}
      ARTIFACT_TTL_SECONDS: ${ARTIFACT_TTL_SECONDS:-86400}
      PRESIGNED_URL_TTL_SECONDS: ${PRESIGNED_URL_TTL_SECONDS:-3600}
      CAPTCHA_REQUIRED: ${CAPTCHA_REQUIRED:-false}
      TURNSTILE_SECRET_KEY: ${TURNSTILE_SECRET_KEY:-}
      TURNSTILE_VERIFY_URL: ${TURNSTILE_VERIFY_URL:-https://challenges.cloudflare.com/turnstile/v0/siteverify}
      RATE_LIMIT_PREVIEW_COUNT: ${RATE_LIMIT_PREVIEW_COUNT:-20}
      RATE_LIMIT_PREVIEW_WINDOW_SECONDS: ${RATE_LIMIT_PREVIEW_WINDOW_SECONDS:-600}
      RATE_LIMIT_LOCATIONS_COUNT: ${RATE_LIMIT_LOCATIONS_COUNT:-60}
      RATE_LIMIT_LOCATIONS_WINDOW_SECONDS: ${RATE_LIMIT_LOCATIONS_WINDOW_SECONDS:-600}
      RATE_LIMIT_JOBS_COUNT: ${RATE_LIMIT_JOBS_COUNT:-5}
      RATE_LIMIT_JOBS_WINDOW_SECONDS: ${RATE_LIMIT_JOBS_WINDOW_SECONDS:-600}
      RATE_LIMIT_MAX_CONCURRENT_JOBS_PER_IP: ${RATE_LIMIT_MAX_CONCURRENT_JOBS_PER_IP:-2}
      NOMINATIM_SEARCH_URL: ${NOMINATIM_SEARCH_URL:-https://nominatim.openstreetmap.org/search}
      NOMINATIM_USER_AGENT: ${NOMINATIM_USER_AGENT:-city-map-poster-generator/1.0}
    ports:
      - "8000:8000"
    depends_on:
      - redis
      - minio
    volumes:
      - map_cache:/tmp/map-cache

  worker:
    build:
      context: .
      dockerfile: docker/api.Dockerfile
    container_name: city-map-worker
    environment:
      APP_ENV: ${APP_ENV:-development}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      RQ_QUEUE_NAME: ${RQ_QUEUE_NAME:-map_jobs}
      S3_ENDPOINT_URL: ${S3_ENDPOINT_URL:-http://minio:9000}
      S3_PUBLIC_ENDPOINT_URL: ${S3_PUBLIC_ENDPOINT_URL:-http://localhost:9000}
      S3_REGION_NAME: ${S3_REGION_NAME:-us-east-1}
      S3_ACCESS_KEY_ID: ${S3_ACCESS_KEY_ID:-minioadmin}
      S3_SECRET_ACCESS_KEY: ${S3_SECRET_ACCESS_KEY:-minioadmin}
      S3_BUCKET_PREVIEWS: ${S3_BUCKET_PREVIEWS:-map-previews}
      S3_BUCKET_ARTIFACTS: ${S3_BUCKET_ARTIFACTS:-map-artifacts}
      S3_SECURE: ${S3_SECURE:-false}
      PREVIEW_TTL_SECONDS: ${PREVIEW_TTL_SECONDS:-43200}
      PREVIEW_RASTER_DPI: ${PREVIEW_RASTER_DPI:-120}
      PREVIEW_NETWORK_TYPE: ${PREVIEW_NETWORK_TYPE:-drive}
      PREVIEW_INCLUDE_WATER: ${PREVIEW_INCLUDE_WATER:-false}
      PREVIEW_INCLUDE_PARKS: ${PREVIEW_INCLUDE_PARKS:-false}
      ARTIFACT_TTL_SECONDS: ${ARTIFACT_TTL_SECONDS:-86400}
      PRESIGNED_URL_TTL_SECONDS: ${PRESIGNED_URL_TTL_SECONDS:-3600}
      CAPTCHA_REQUIRED: ${CAPTCHA_REQUIRED:-false}
      TURNSTILE_SECRET_KEY: ${TURNSTILE_SECRET_KEY:-}
      TURNSTILE_VERIFY_URL: ${TURNSTILE_VERIFY_URL:-https://challenges.cloudflare.com/turnstile/v0/siteverify}
      RATE_LIMIT_PREVIEW_COUNT: ${RATE_LIMIT_PREVIEW_COUNT:-20}
      RATE_LIMIT_PREVIEW_WINDOW_SECONDS: ${RATE_LIMIT_PREVIEW_WINDOW_SECONDS:-600}
      RATE_LIMIT_LOCATIONS_COUNT: ${RATE_LIMIT_LOCATIONS_COUNT:-60}
      RATE_LIMIT_LOCATIONS_WINDOW_SECONDS: ${RATE_LIMIT_LOCATIONS_WINDOW_SECONDS:-600}
      RATE_LIMIT_JOBS_COUNT: ${RATE_LIMIT_JOBS_COUNT:-5}
      RATE_LIMIT_JOBS_WINDOW_SECONDS: ${RATE_LIMIT_JOBS_WINDOW_SECONDS:-600}
      RATE_LIMIT_MAX_CONCURRENT_JOBS_PER_IP: ${RATE_LIMIT_MAX_CONCURRENT_JOBS_PER_IP:-2}
      NOMINATIM_SEARCH_URL: ${NOMINATIM_SEARCH_URL:-https://nominatim.openstreetmap.org/search}
      NOMINATIM_USER_AGENT: ${NOMINATIM_USER_AGENT:-city-map-poster-generator/1.0}
    command: ["python", "-m", "app.worker"]
    depends_on:
      - redis
      - minio
    volumes:
      - map_cache:/tmp/map-cache

  redis:
    image: redis:7-alpine
    container_name: city-map-redis
    ports:
      - "6379:6379"

  minio:
    image: minio/minio:latest
    container_name: city-map-minio
    environment:
      MINIO_ROOT_USER: ${S3_ACCESS_KEY_ID:-minioadmin}
      MINIO_ROOT_PASSWORD: ${S3_SECRET_ACCESS_KEY:-minioadmin}
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data

volumes:
  minio_data:
  map_cache:
